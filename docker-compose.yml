version: '3.9'

services:
  mysql:
    image: mysql:8.4
    container_name: medvedsson-mysql
    environment:
      MYSQL_DATABASE: crypto_dryrun
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: medvedsson-api
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://root:root@mysql:3306/crypto_dryrun
      API_BASE_URL: http://api:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
    ports:
      - '3000:3000'
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  pwa:
    build:
      context: .
      dockerfile: Dockerfile
      target: pwa
    container_name: medvedsson-pwa
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
    ports:
      - '3001:3001'
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: medvedsson-adminer
    depends_on:
      - mysql
    ports:
      - '8080:8080'

volumes:
  mysql_data:
